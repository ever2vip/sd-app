<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#090806" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Luxoria Prototype</title>
<style>
:root{--gold:#d9ad55;--bg:#070706;--glass:rgba(18,16,12,.72)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;height:100%;background:radial-gradient(circle at 50% 0,#2a1a08 0,#090806 35%,#030303 100%);font-family:Arial,sans-serif;color:#fff;overflow:hidden}
.app{height:100dvh;display:flex;align-items:center;justify-content:center;padding:8px}.phone{position:relative;height:min(100dvh,900px);aspect-ratio:941/1672;overflow:hidden;border-radius:34px;box-shadow:0 0 0 1px rgba(255,255,255,.09),0 30px 80px #000,0 0 50px rgba(217,173,85,.12);background:#000}
.screen{position:absolute;inset:0;opacity:0;transform:translateX(12%);transition:opacity .45s ease,transform .55s cubic-bezier(.2,.8,.2,1);pointer-events:none}.screen.active{opacity:1;transform:translateX(0);pointer-events:auto}.screen img{width:100%;height:100%;object-fit:cover;display:block}
.glow{position:absolute;inset:auto 12% 4% 12%;height:7%;border-radius:50%;filter:blur(34px);background:rgba(217,173,85,.22);animation:pulse 2.8s ease-in-out infinite;pointer-events:none}@keyframes pulse{50%{opacity:.4;transform:scaleX(.86)}}
.nav{position:absolute;left:5.5%;right:5.5%;bottom:2.2%;height:7.8%;display:grid;grid-template-columns:repeat(5,1fr);z-index:10}.nav button{border:0;background:transparent;color:transparent;cursor:pointer;position:relative}.nav button::after{content:"";position:absolute;left:35%;right:35%;bottom:0;height:2px;border-radius:3px;background:transparent;box-shadow:none;transition:.3s}.nav button.active::after{background:var(--gold);box-shadow:0 0 10px var(--gold)}
.top-tabs{position:absolute;z-index:12;left:7%;right:7%;top:11.7%;height:4.2%;display:none;grid-template-columns:repeat(4,1fr)}.feed-active .top-tabs{display:grid}.top-tabs button{border:0;background:transparent;color:transparent}
.fab{position:absolute;z-index:13;left:44%;right:44%;bottom:3.7%;height:5.8%;border-radius:50%;border:0;background:transparent;display:none}.feed-active .fab{display:block}.toast{position:absolute;z-index:30;left:10%;right:10%;bottom:13%;padding:12px 16px;background:var(--glass);border:1px solid rgba(217,173,85,.45);border-radius:14px;text-align:center;font-size:13px;opacity:0;transform:translateY(10px);transition:.3s;backdrop-filter:blur(14px)}.toast.show{opacity:1;transform:none}
@media(max-width:600px){.app{padding:0}.phone{width:100vw;height:100dvh;aspect-ratio:auto;border-radius:0}}
</style>
</head>
<body>
<div class="app"><main class="phone" id="phone">
  <section class="screen active" data-screen="home"><img src="assets/home.png" alt="Home"></section>
  <section class="screen" data-screen="feed"><img src="assets/feed.png" alt="Feed"></section>
  <section class="screen" data-screen="event"><img src="assets/event.png" alt="Event"></section>
  <section class="screen" data-screen="chat"><img src="assets/chat.png" alt="Chat"></section>
  <section class="screen" data-screen="profile"><img src="assets/profile.png" alt="Profile"></section>
  <div class="top-tabs"><button data-toast="For You feed selected"></button><button data-toast="Members filter selected"></button><button data-toast="Events filter selected"></button><button data-toast="Rooms filter selected"></button></div>
  <button class="fab" data-toast="Create post — demo action"></button>
  <nav class="nav">
    <button class="active" data-go="home" aria-label="Home"></button>
    <button data-go="event" aria-label="Events"></button>
    <button data-go="chat" aria-label="Chat"></button>
    <button data-go="event" aria-label="Tickets"></button>
    <button data-go="profile" aria-label="Profile"></button>
  </nav>
  <div class="glow"></div><div class="toast" id="toast"></div>
</main></div>
<script>
const phone=document.getElementById('phone'),screens=[...document.querySelectorAll('.screen')],nav=[...document.querySelectorAll('.nav button')],toast=document.getElementById('toast');
function go(name){screens.forEach(s=>s.classList.toggle('active',s.dataset.screen===name));phone.classList.toggle('feed-active',name==='feed');nav.forEach(b=>b.classList.toggle('active',b.dataset.go===name || (name==='feed'&&b.dataset.go==='home')));history.replaceState(null,'','#'+name)}
nav.forEach(b=>b.addEventListener('click',()=>go(b.dataset.go)));document.querySelector('[data-screen="home"]').addEventListener('dblclick',()=>go('feed'));
document.querySelectorAll('[data-toast]').forEach(b=>b.addEventListener('click',()=>{toast.textContent=b.dataset.toast;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400)}));
let x=0;phone.addEventListener('touchstart',e=>x=e.touches[0].clientX,{passive:true});phone.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-x;if(Math.abs(d)>70){const order=['home','feed','event','chat','profile'];let i=order.indexOf(location.hash.slice(1)||'home');go(order[Math.max(0,Math.min(order.length-1,i+(d<0?1:-1)))])}},{passive:true});
const initial=location.hash.slice(1);if(['home','feed','event','chat','profile'].includes(initial))go(initial);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script></body></html>
